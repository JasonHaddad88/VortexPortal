# Fly.io config for an always-on Vortex relay.
# Deploy from the REPO ROOT so the Docker build can see hub/:
#   fly deploy --config deploy/fly.toml
# See deploy/README.md for the full walkthrough (secrets, etc.).

app = "CHANGE-ME-vortex-relay"   # must be globally unique; `fly apps create` picks one
primary_region = "iad"           # pick one near you: fly platform regions

[build]
  dockerfile = "Dockerfile"      # at the repo root (build context = repo root)

[env]
  APP_PORT = "8080"
  # VORTEX_HUB_PUBLIC_URL is set after first deploy, once you know the
  # https://<app>.fly.dev hostname:  fly secrets set VORTEX_HUB_PUBLIC_URL=...

[http_service]
  internal_port = 8080
  force_https = true
  # An always-on relay must NOT scale to zero, or cross-network control
  # breaks whenever it's idle. Keep exactly one machine running.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"               # the hub is light; 256 MB is plenty
